<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AIDND DM Extension</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>AIDND DM Extension</h1>
    <p class="subtitle">Local AI via Ollama</p>

    <div class="field">
      <label for="ollamaUrl">Ollama URL</label>
      <div class="url-row">
        <input type="text" id="ollamaUrl" placeholder="http://localhost:11434">
        <button id="checkBtn" class="btn-check" title="Test connection">&#x21BB;</button>
      </div>
    </div>

    <div id="connectionStatus" class="connection-status"></div>

    <div class="field">
      <label for="model">Model</label>
      <select id="model" disabled></select>
      <div id="modelInfo" class="model-info"></div>
    </div>

    <div id="toolStatus" class="tool-status"></div>

    <button id="save" class="btn-primary">Save</button>

    <div id="status" class="status"></div>

    <div class="guide">
      <p>Setup Guide</p>
      <ol>
        <li>Install <a href="https://ollama.com" target="_blank">Ollama</a></li>
        <li>Pull a model: <code>ollama pull qwen3</code></li>
        <li>Ollama runs automatically — configure above</li>
      </ol>
    </div>
  </div>

  <script src="dist/popup.js" type="module"></script>
</body>
</html>
