<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AIDND DM Extension</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>AIDND DM Extension</h1>

    <div class="field">
      <label for="provider">Provider</label>
      <select id="provider"></select>
    </div>

    <div class="field">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="Enter API key...">
      <a id="key-help" href="#" target="_blank" class="help-link">Get an API key</a>
    </div>

    <div class="field">
      <label for="model">Model</label>
      <select id="model"></select>
    </div>

    <button id="save" class="btn-primary">Save & Connect</button>

    <div id="status" class="status"></div>
  </div>

  <script src="dist/popup.js" type="module"></script>
</body>
</html>
